<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lab05</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .box {
            background-color: #ef0433;
            border: 1px solid #000;
            padding: 10px;
            text-align: center;
        }

        .header-gray {
            background-color: #b7eb9e;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="container-fluid mt-4">

        <!-- Título -->
        <h1 class="text-center mb-4">An animated element</h1>

        <!-- Primera sección -->
        <div class="p-4 bg-light mb-4">
            <h2>Lab04</h2>
            <p class="text-success">container-fluid</p>
            <p>One of three columns</p>
        </div>

        <!-- Segunda sección -->
        <div class="header-gray mb-3">
            <h2>Lab04</h2>
            <p class="text-success">container-fluid</p>
        </div>

        <!-- Fila 1 -->
        <div class="row mb-2">
            <div class="col-sm-4 box">Responsive</div>
            <div class="col-sm-4 box">col-sm-4</div>
        </div>

        <!-- Fila 2 -->
        <div class="row mb-2">
            <div class="col-sm-4 box">col-sm-4</div>
            <div class="col-sm-2 box">col-sm-2</div>
        </div>

        <!-- Fila 3 -->
        <div class="row mb-4">
            <div class="col-sm box">col-sm</div>
            <div class="col-sm box">col-sm</div>
            <div class="col-sm box">col-sm</div>
        </div>

        <!-- Formulario -->
        <form>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" placeholder="Enter your full name">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control">
                    <div class="form-text">We'll never share your email with anyone else.</div>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-control">
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Submit</button>
        </form>

    </div>

</body>
</html>
